name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # GitHub Actions cron is UTC. Run conformance weekly at Sunday noon UTC.
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        run: make build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Test
        run: make test

  vet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Vet
        run: make vet

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Pkl
        env:
          PKL_VERSION: 0.31.1
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/$PKL_VERSION/pkl-linux-amd64"
          chmod +x pkl
          sudo mv pkl /usr/local/bin/pkl
          pkl --version

      - name: Validate Pkl schemas
        run: make pkl-eval FORMAE=/nonexistent/formae

      - name: Package Pkl schemas
        run: make pkg-pkl

  conformance:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Pkl
        env:
          PKL_VERSION: 0.31.1
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/$PKL_VERSION/pkl-linux-amd64"
          chmod +x pkl
          sudo mv pkl /usr/local/bin/pkl
          pkl --version

      - name: Install hcloud CLI
        run: go install github.com/hetznercloud/cli/cmd/hcloud@latest

      - name: Clean conformance environment
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: make clean-environment

      - name: Run conformance tests
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: make conformance-test

      - name: Clean conformance environment after run
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: make clean-environment
